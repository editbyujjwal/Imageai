<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal AI Image Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B1220;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Input Container Fix: No corners sticking out */
        .input-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px; /* Perfect 22px radius */
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden; /* Yeh corners ko nikalne se rokta hai */
            display: flex;
            align-items: center;
        }

        .input-container:focus-within {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Ambient Glow */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(59, 130, 246, 0.1);
            filter: blur(100px);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .loader {
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .result-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-6 flex items-center justify-center">

    <div class="glow top-0 left-1/2 -translate-x-1/2"></div>

    <main class="w-full max-w-lg relative z-10 flex flex-col items-center">
        
        <!-- Headline -->
        <header id="hero" class="text-center mb-14 transition-all duration-700">
            <h1 class="text-4xl sm:text-5xl font-bold tracking-tight mb-4">
                Create Without Limits
            </h1>
            <p class="text-slate-400 text-lg font-medium opacity-80">
                From idea to image — instantly.
            </p>
        </header>

        <!-- Result Section -->
        <div id="result-area" class="hidden w-full mb-10 result-card overflow-hidden relative min-h-[300px] flex items-center justify-center">
            <!-- Loading -->
            <div id="loading" class="hidden absolute inset-0 bg-[#0B1220]/80 z-20 flex flex-col items-center justify-center gap-4">
                <div class="w-10 h-10 border-2 border-blue-500 loader rounded-full"></div>
                <p class="text-slate-400 text-sm font-medium animate-pulse">Generating your vision...</p>
            </div>

            <!-- Image Output -->
            <img id="output-image" src="" class="hidden w-full h-auto object-cover max-h-[500px]">
            
            <!-- Text Response (For Reasoning) -->
            <div id="output-text" class="hidden p-8 text-slate-300 leading-relaxed text-lg"></div>

            <!-- Actions -->
            <div id="actions" class="absolute bottom-4 right-4 flex gap-2 hidden">
                <button onclick="resetUI()" class="p-3 bg-white/10 rounded-full hover:bg-white/20 transition-all"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
                <a id="download-link" href="#" download="ai-vision.png" class="p-3 bg-blue-600 rounded-full hover:bg-blue-500 transition-all"><i data-lucide="download" class="w-5 h-5"></i></a>
            </div>
        </div>

        <!-- Reference Preview -->
        <div id="ref-preview" class="hidden w-full mb-4 flex items-center gap-3 bg-white/5 p-2 rounded-2xl border border-white/10">
            <img id="ref-thumb" src="" class="w-12 h-12 rounded-lg object-cover">
            <div class="flex-1">
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Reference Active</p>
                <p class="text-xs text-slate-500">Image will guide the AI</p>
            </div>
            <button onclick="clearRef()" class="p-2 text-slate-500 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
        </div>

        <!-- Main Input Form -->
        <form id="gen-form" class="w-full">
            <div class="input-container p-1 pl-6">
                <input 
                    type="text" 
                    id="prompt-input"
                    placeholder="Describe your vision.."
                    class="w-full bg-transparent py-4 text-white placeholder:text-slate-600 focus:outline-none text-lg"
                    required
                >
                <div class="flex items-center gap-1 pr-2">
                    <button type="button" onclick="document.getElementById('file-input').click()" class="p-3 text-slate-500 hover:text-blue-400 transition-colors">
                        <i data-lucide="image-plus" class="w-6 h-6"></i>
                    </button>
                    <button type="submit" id="submit-btn" class="w-12 h-12 bg-white/5 text-slate-700 rounded-full flex items-center justify-center transition-all cursor-not-allowed">
                        <i data-lucide="arrow-up" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile(event)">
        </form>

        <!-- Labels -->
        <footer class="mt-12 flex gap-8 text-[10px] font-bold tracking-[0.3em] text-slate-700 uppercase">
            <span>Fast</span>
            <span>•</span>
            <span>Secure</span>
            <span>•</span>
            <span>Powerful</span>
        </footer>

    </main>

    <script>
        // API Config
        const apiKey = "AIzaSyDqPIgpsszkY187dE8k254OBIQMVtwJdpc";
        const IMAGEN_MODEL = "imagen-4.0-generate-001";
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

        let refBase64 = null;
        let isBusy = false;

        lucide.createIcons();

        const form = document.getElementById('gen-form');
        const input = document.getElementById('prompt-input');
        const btn = document.getElementById('submit-btn');
        const resultArea = document.getElementById('result-area');
        const loader = document.getElementById('loading');
        const outputImg = document.getElementById('output-image');
        const outputText = document.getElementById('output-text');
        const hero = document.getElementById('hero');

        // Button color logic
        input.addEventListener('input', () => {
            const hasText = input.value.trim().length > 0;
            btn.classList.toggle('bg-blue-600', hasText);
            btn.classList.toggle('text-white', hasText);
            btn.classList.toggle('bg-white/5', !hasText);
            btn.classList.toggle('text-slate-700', !hasText);
            btn.classList.toggle('cursor-not-allowed', !hasText);
        });

        function handleFile(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    refBase64 = e.target.result;
                    document.getElementById('ref-thumb').src = refBase64;
                    document.getElementById('ref-preview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function clearRef() {
            refBase64 = null;
            document.getElementById('ref-preview').classList.add('hidden');
            document.getElementById('file-input').value = "";
        }

        function resetUI() {
            resultArea.classList.add('hidden');
            hero.classList.remove('hidden', 'opacity-0');
            input.value = "";
            clearRef();
        }

        async function generate(prompt, ref) {
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    // Check if prompt is image-focused or text-focused
                    const isImageQuery = prompt.toLowerCase().includes('generate') || prompt.toLowerCase().includes('image') || prompt.toLowerCase().includes('draw') || prompt.toLowerCase().includes('create');
                    
                    let url, body;

                    if (isImageQuery && !ref) {
                        url = `https://generativelanguage.googleapis.com/v1beta/models/${IMAGEN_MODEL}:predict?key=${apiKey}`;
                        body = { instances: [{ prompt }], parameters: { sampleCount: 1 } };
                    } else {
                        url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
                        const parts = [{ text: prompt }];
                        if (ref) parts.push({ inlineData: { mimeType: "image/png", data: ref.split(',')[1] } });
                        body = { contents: [{ parts }], generationConfig: { responseModalities: isImageQuery ? ["IMAGE"] : ["TEXT"] } };
                    }

                    const response = await fetch(url, { method: 'POST', body: JSON.stringify(body) });
                    if (!response.ok) throw new Error();
                    return await response.json();
                } catch (e) {
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
            throw new Error("Failed");
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const prompt = input.value.trim();
            if (!prompt || isBusy) return;

            isBusy = true;
            input.disabled = true;
            btn.disabled = true;

            hero.classList.add('opacity-0');
            setTimeout(() => hero.classList.add('hidden'), 500);
            resultArea.classList.remove('hidden');
            loader.classList.remove('hidden');
            outputImg.classList.add('hidden');
            outputText.classList.add('hidden');
            document.getElementById('actions').classList.add('hidden');

            try {
                const data = await generate(prompt, refBase64);
                
                // Extract Image or Text
                let imgSrc = null;
                let txtResponse = null;

                if (data.predictions) {
                    imgSrc = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                } else if (data.candidates) {
                    const part = data.candidates[0].content.parts[0];
                    if (part.inlineData) imgSrc = `data:image/png;base64,${part.inlineData.data}`;
                    else txtResponse = part.text;
                }

                if (imgSrc) {
                    outputImg.src = imgSrc;
                    document.getElementById('download-link').href = imgSrc;
                    outputImg.classList.remove('hidden');
                } else {
                    outputText.innerText = txtResponse;
                    outputText.classList.remove('hidden');
                }
                
                document.getElementById('actions').classList.remove('hidden');
            } catch (err) {
                outputText.innerText = "Error: Service limit reached or API unavailable. Please try again.";
                outputText.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
                isBusy = false;
                input.disabled = false;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
